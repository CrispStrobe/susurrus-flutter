name: crisper_weaver
description: A cross-platform Flutter app for fully-offline audio transcription. Ten ASR families via CrispASR.

publish_to: 'none'

version: 0.1.8+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Localization runtime + Flutter's bundled Material / Cupertino / Widget
  # delegates for the 80+ built-in locales.
  flutter_localizations:
    sdk: flutter

  # UI and state management
  cupertino_icons: ^1.0.6
  # Pinned by flutter SDK; use a loose range so other transitive deps don't
  # force us onto an older version.
  material_color_utilities: ">=0.8.0 <0.12.0"
  flutter_riverpod: ^2.4.9
  go_router: ^17.2.1

  # Audio handling
  audio_session: ^0.2.3
  just_audio: ^0.10.5
  record: ^6.2.0
  path_provider: ^2.1.1
  permission_handler: ^12.0.1

  # File handling
  file_picker: ^11.0.2
  path: ^1.8.3

  # Network and downloads
  http: ^1.1.2
  dio: ^5.4.0
  url_launcher: ^6.2.2

  # Native integration
  ffi: ^2.1.0

  # On-device speech recognition via ggml (Whisper, Qwen3-ASR, FastConformer, ...)
  crispasr:
    path: ../CrispASR/flutter/crispasr

  # Utility
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  intl: ">=0.19.0 <0.21.0"

  # Additional required dependencies
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1
  # Pinned below 12.4 because 12.4.0 calls NSProcessInfo.isiOSAppOnVision
  # (iOS 26.1 selector), which the GitHub Actions macos-latest Xcode SDK
  # doesn't know about yet → "No visible @interface" compile error.
  device_info_plus: ">=11.0.0 <12.4.0"

  # For model downloads and verification - ENHANCED
  crypto: ^3.0.3
  archive: ^4.0.9
  
  # Progress indicators and animations
  percent_indicator: ^4.2.3
  
  # Better HTTP handling
  retry: ^3.1.2

  # Inbound share: receive audio files from other apps via the OS share
  # sheet (Android) or document picker (iOS/macOS).
  receive_sharing_intent: ^1.8.0

  # Drop target — desktop drag-and-drop of audio files onto the app
  # window. macOS / Windows / Linux are fully supported; mobile is a
  # no-op (DnD across apps isn't a thing on iOS/Android).
  desktop_drop: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4

  # For FFI bindings (if needed for desktop)
  ffigen: ^20.1.1

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

# Pin the Linux implementation of `record` to a version that matches the
# current platform interface contract — the transitively-resolved 0.7.2 is
# too old and breaks even when we're building for macOS.
dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  # Codegen for ARB → Dart localizations. Configured via l10n.yaml.
  generate: true

  assets:
    - assets/models/
    - assets/images/
    - assets/licenses/
    - assets/vad/
  # No custom fonts shipped yet — relying on the platform system font.