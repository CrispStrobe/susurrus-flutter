name: susurrus_flutter
description: A Flutter audio transcription app with speaker diarization using whisper.cpp and CoreML

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI and state management
  cupertino_icons: ^1.0.2
  material_color_utilities: ^0.8.0
  flutter_riverpod: ^2.4.9
  go_router: ^12.1.3

  # Audio handling
  audio_session: ^0.1.16
  just_audio: ^0.9.36
  record: ^5.0.4
  path_provider: ^2.1.1
  permission_handler: ^11.2.0

  # File handling
  file_picker: ^6.1.1
  path: ^1.8.3

  # Network and downloads
  http: ^1.1.2
  dio: ^5.4.0
  url_launcher: ^6.2.2

  # Native integration
  ffi: ^2.1.0

  # Utility
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0

  # Missing dependencies
  share_plus: ^7.2.1
  package_info_plus: ^4.2.0
  device_info_plus: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  ffigen: ^9.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/

  fonts:
    - family: SF Pro
      fonts:
        - asset: fonts/SFPro-Regular.ttf
        - asset: fonts/SFPro-Bold.ttf
          weight: 700