name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.5"
  # Where we expect the sibling CrispASR checkout to live. The Dart pubspec
  # references the Flutter package inside it at `../CrispASR/flutter/crispasr`.
  CRISPASR_REPO: CrispStrobe/CrispASR
  CRISPASR_REF: main

jobs:
  analyze-and-test:
    name: Analyze + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out CrisperWeaver
        uses: actions/checkout@v5
        with:
          path: repos/CrisperWeaver

      - name: Check out sibling CrispASR (Dart FFI package)
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CRISPASR_REPO }}
          ref: ${{ env.CRISPASR_REF }}
          path: repos/CrispASR

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: repos/CrisperWeaver
        run: flutter pub get

      - name: Dart analyze (treat errors as failures only)
        working-directory: repos/CrisperWeaver
        # `flutter analyze` exits non-zero on infos/warnings too. We only want
        # to fail on errors; infos/warnings are surfaced in the log.
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings
          status=$?
          if [ $status -ne 0 ]; then
            echo "::error::flutter analyze reported errors"
            exit $status
          fi

      - name: Tests
        working-directory: repos/CrisperWeaver
        run: flutter test --reporter expanded

  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - name: Check out CrisperWeaver
        uses: actions/checkout@v5
        with:
          path: repos/CrisperWeaver

      - name: Check out sibling CrispASR
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CRISPASR_REPO }}
          ref: ${{ env.CRISPASR_REF }}
          path: repos/CrispASR
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build libwhisper.dylib
        working-directory: repos/CrispASR
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON -DWHISPER_METAL=ON
          cmake --build build --config Release --parallel --target crispasr
          ls -lh build/src/libwhisper*.dylib

      - name: Pub get
        working-directory: repos/CrisperWeaver
        run: flutter pub get

      - name: Build macOS app (debug)
        working-directory: repos/CrisperWeaver
        run: flutter build macos --debug

      - name: Bundle all CrispASR dylibs + ad-hoc sign
        working-directory: repos/CrisperWeaver
        run: |
          CRISPASR_DIR="$GITHUB_WORKSPACE/repos/CrispASR" \
            APP=build/macos/Build/Products/Debug/crisper_weaver.app \
            ./scripts/bundle_macos_dylibs.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v5
        with:
          name: crisper_weaver-macos-debug
          path: repos/CrisperWeaver/build/macos/Build/Products/Debug/crisper_weaver.app
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux desktop
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - name: Check out CrisperWeaver
        uses: actions/checkout@v5
        with:
          path: repos/CrisperWeaver

      - name: Check out sibling CrispASR
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CRISPASR_REPO }}
          ref: ${{ env.CRISPASR_REF }}
          path: repos/CrispASR
          submodules: recursive

      - name: Install Linux desktop toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev libglu1-mesa

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build libwhisper.so
        working-directory: repos/CrispASR
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
          cmake --build build --config Release --parallel --target crispasr
          ls -lh build/src/libwhisper*.so*

      - name: Enable linux desktop + pub get
        working-directory: repos/CrisperWeaver
        run: |
          flutter config --enable-linux-desktop
          flutter pub get

      - name: Build Linux (debug)
        working-directory: repos/CrisperWeaver
        run: flutter build linux --debug

      - name: Bundle all CrispASR .so's into bundle/lib/
        working-directory: repos/CrisperWeaver
        run: |
          BUNDLE=build/linux/x64/debug/bundle
          mkdir -p "$BUNDLE/lib"

          # Core library — pick the real file, then symlink both
          # historical names so either open path works.
          SO=$(ls ../CrispASR/build/src/libwhisper.so.[0-9]* 2>/dev/null | head -1)
          [ -z "$SO" ] && SO=../CrispASR/build/src/libwhisper.so
          cp "$SO" "$BUNDLE/lib/libwhisper.so"
          ln -sf libwhisper.so "$BUNDLE/lib/libcrispasr.so"

          # Sibling backend .so's — DT_NEEDED by libwhisper.so. Missing
          # ones just get skipped (slim builds stay valid).
          for name in parakeet canary qwen3_asr cohere granite_speech \
                      canary_ctc voxtral voxtral4b; do
            src="../CrispASR/build/src/lib${name}.so"
            if [ -f "$src" ]; then
              cp "$src" "$BUNDLE/lib/lib${name}.so"
            else
              echo "warn: $src missing, backend ${name} not runtime-ready" >&2
            fi
          done
          ls -lh "$BUNDLE/lib/"

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v5
        with:
          name: crisper_weaver-linux-debug
          path: repos/CrisperWeaver/build/linux/x64/debug/bundle
          if-no-files-found: error
          retention-days: 14
