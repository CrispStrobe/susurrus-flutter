name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.38.5"
  # Where we expect the sibling CrispASR checkout to live. The Dart pubspec
  # references the Flutter package inside it at `../CrispASR/flutter/crispasr`.
  CRISPASR_REPO: CrispStrobe/CrispASR
  CRISPASR_REF: main

jobs:
  analyze-and-test:
    name: Analyze + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out CrisperWeaver
        uses: actions/checkout@v5
        with:
          path: repos/CrisperWeaver

      - name: Check out sibling CrispASR (Dart FFI package)
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CRISPASR_REPO }}
          ref: ${{ env.CRISPASR_REF }}
          path: repos/CrispASR

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: repos/CrisperWeaver
        run: flutter pub get

      - name: Dart analyze (treat errors as failures only)
        working-directory: repos/CrisperWeaver
        # `flutter analyze` exits non-zero on infos/warnings too. We only want
        # to fail on errors; infos/warnings are surfaced in the log.
        run: |
          set +e
          flutter analyze --no-fatal-infos --no-fatal-warnings
          status=$?
          if [ $status -ne 0 ]; then
            echo "::error::flutter analyze reported errors"
            exit $status
          fi

      - name: Tests
        working-directory: repos/CrisperWeaver
        run: flutter test --reporter expanded

  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - name: Check out CrisperWeaver
        uses: actions/checkout@v5
        with:
          path: repos/CrisperWeaver

      - name: Check out sibling CrispASR
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CRISPASR_REPO }}
          ref: ${{ env.CRISPASR_REF }}
          path: repos/CrispASR
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Use the same end-to-end macOS build script we run locally.
      # The earlier hand-rolled `cmake -B build … --target crispasr`
      # diverged from `scripts/build_macos.sh` in a few load-bearing
      # ways: it didn't disable CRISPASR_BUILD_TESTS / EXAMPLES /
      # SERVER (so cmake configure pulled in unrelated source trees
      # and tripped on the OBJCXX language requirement that comes in
      # via the CoreML wrappers when CRISPASR_COREML defaults to AUTO);
      # and it only built the `crispasr` target without first building
      # the 30 per-backend STATIC archives, so the resulting
      # libwhisper.dylib was missing every backend except whisper.
      # Driving the same script we use locally keeps both paths
      # validated together and avoids future "works on my machine" gaps.
      - name: Build CrispASR + Flutter macOS app (one shot via script)
        working-directory: repos/CrisperWeaver
        env:
          CRISPASR_DIR: ${{ github.workspace }}/repos/CrispASR
        run: bash scripts/build_macos.sh debug

      - name: Upload .app artifact
        uses: actions/upload-artifact@v6
        with:
          name: crisper_weaver-macos-debug
          path: repos/CrisperWeaver/build/macos/Build/Products/Debug/crisper_weaver.app
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux desktop
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - name: Check out CrisperWeaver
        uses: actions/checkout@v5
        with:
          path: repos/CrisperWeaver

      - name: Check out sibling CrispASR
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CRISPASR_REPO }}
          ref: ${{ env.CRISPASR_REF }}
          path: repos/CrispASR
          submodules: recursive

      - name: Install Linux desktop toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev libglu1-mesa

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable linux desktop
        run: flutter config --enable-linux-desktop

      # Same shape as the macOS job above — drive the local
      # `scripts/build_linux.sh` so the per-backend STATIC build
      # pattern (parakeet, canary, voxtral, kokoro, …) matches what
      # devs run on their machines. The earlier hand-rolled cmake
      # invocation only built `crispasr` and skipped every per-
      # backend static, which left the runtime missing every
      # backend except whisper at app launch.
      - name: Build CrispASR + Flutter Linux desktop (one shot via script)
        working-directory: repos/CrisperWeaver
        env:
          CRISPASR_DIR: ${{ github.workspace }}/repos/CrispASR
        run: bash scripts/build_linux.sh debug

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v6
        with:
          name: crisper_weaver-linux-debug
          path: repos/CrisperWeaver/build/linux/x64/debug/bundle
          if-no-files-found: error
          retention-days: 14
